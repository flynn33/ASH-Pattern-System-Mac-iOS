name: Downstream Conformance Agent

# REUSABLE workflow. Validates the six canonical downstream conformance
# artifacts required by handoff-templates/common-downstream-handoff-requirements.md.
#
# The canonical ASH Pattern System repository does NOT invoke this workflow
# on its own push/pull_request events — it is delivered for downstream
# implementation repositories to call via:
#
#   jobs:
#     conformance:
#       uses: flynn33/ASH-Pattern-System/.github/workflows/downstream-conformance-agent.yml@main
#       with:
#         conformance-root: conformance/
#         # ... override individual artifact paths if needed
#
# The acceptance-judgment file must contain one of the three canonical
# judgment strings from specs/verification/implementation-acceptance.md line 69:
#   CONFORMANT
#   CONFORMANT WITH CAVEATS
#   NON-CONFORMANT
#
# The set of accepted strings is intentionally aligned with the canonical
# acceptance doc — neither broader nor narrower.
#
# See governance/github-agents-governance.md for full policy.

on:
  workflow_call:
    inputs:
      conformance-root:
        description: Directory under the downstream repo containing deliverables.
        required: false
        type: string
        default: conformance/
      module-mapping-path:
        description: Path to the module mapping artifact.
        required: false
        type: string
        default: conformance/module-mapping.md
      verification-report-path:
        description: Path to the verification plan/report artifact.
        required: false
        type: string
        default: conformance/verification-report.md
      diagnostics-conformance-path:
        description: Path to the diagnostics conformance artifact.
        required: false
        type: string
        default: conformance/diagnostics-conformance.md
      materialization-boundary-path:
        description: Path to the materialization-boundary artifact.
        required: false
        type: string
        default: conformance/materialization-boundary.md
      deviation-log-path:
        description: Path to the deviation log artifact.
        required: false
        type: string
        default: conformance/deviation-log.md
      acceptance-judgment-path:
        description: Path to the acceptance judgment artifact.
        required: false
        type: string
        default: conformance/acceptance-judgment.md
      require-all:
        description: If true, missing artifacts are blocking. If false, they are warnings only.
        required: false
        type: boolean
        default: true

jobs:
  downstream-conformance:
    name: Downstream conformance check
    runs-on: ubuntu-latest
    env:
      CONFORMANCE_ROOT: ${{ inputs.conformance-root }}
      MODULE_MAPPING_PATH: ${{ inputs.module-mapping-path }}
      VERIFICATION_REPORT_PATH: ${{ inputs.verification-report-path }}
      DIAGNOSTICS_CONFORMANCE_PATH: ${{ inputs.diagnostics-conformance-path }}
      MATERIALIZATION_BOUNDARY_PATH: ${{ inputs.materialization-boundary-path }}
      DEVIATION_LOG_PATH: ${{ inputs.deviation-log-path }}
      ACCEPTANCE_JUDGMENT_PATH: ${{ inputs.acceptance-judgment-path }}
      REQUIRE_ALL: ${{ inputs.require-all }}
    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch downstream conformance check script
        uses: actions/checkout@v4
        with:
          repository: flynn33/ASH-Pattern-System
          ref: main
          path: .ash-canonical
          sparse-checkout: |
            .github/scripts

      - name: Run downstream conformance check
        run: python3 .ash-canonical/.github/scripts/downstream_conformance_check.py
