name: Math Integrity Agent

# Sentinel workflow. Protects the locked 9D research baseline math.
#
# On any change to a math-critical path (see .github/scripts/math_integrity_check.py
# and governance/github-agents-governance.md for the list), this agent requires:
#   - a math-change note under governance/math-change-notes/ with the three
#     required headings ("## What changed", "## Why", "## Baseline preservation statement")
#   - a human-review label on the PR (math-reviewed, human-reviewed, or baseline-approved)
#     when the event is pull_request and the PR payload is available
#   - no superseded 8+1 canonical language in the post-change content
#   - continued presence of 9D baseline markers in the narrow baseline-marker
#     subset of math-critical files
#
# Report-only on initial landing; promotion to blocking is a follow-up commit.
#
# See governance/github-agents-governance.md for full policy.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REPORT_ONLY: "1"

jobs:
  math-integrity:
    name: Math integrity check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run math integrity check
        run: python3 .github/scripts/math_integrity_check.py
