name: Canonical Semantic Integrity Agent

# Sentinel workflow. Checks:
#   - No superseded 8+1 canonical language reintroduction in active canonical
#     files (narrow file-local exemption for historical files bearing a
#     SUPERSEDED banner in their first 10 lines)
#   - No language claiming handoff templates override or are canonical authority
#   - Status-language contradiction across README, roadmap, and ai-coding-handoff
#     (warning when broad completion phrase appears alone; blocking only when
#     it co-occurs with a Phase-4-active phrase — the actual contradiction)
#
# Report-only on initial landing; promotion to blocking is a follow-up commit.
#
# See governance/github-agents-governance.md for full policy.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REPORT_ONLY: "1"

jobs:
  semantic-integrity:
    name: Canonical semantic integrity check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run canonical semantic integrity check
        run: python3 .github/scripts/semantic_integrity_check.py
